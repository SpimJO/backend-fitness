# Render Blueprint for the fitquest backend
# Docs: https://render.com/docs/blueprint-spec
# This file lives at the ROOT of the backend repo (rmr001/fitquest-backend-v2).

databases:
  - name: fitquest-db
    databaseName: fitquest
    user: fitquest
    plan: free

services:
  - type: web
    name: fitquest-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitquest-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Gemini key — value NOT stored in git. Render will prompt on first deploy.
      - key: GEMINI_API_KEY
        sync: false
