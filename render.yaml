# Render Blueprint — FitQuest API (PostgreSQL)
# https://render.com/docs/blueprint-spec
#
# Deploy options:
#   A) This folder IS the Git repo root → use as-is.
#   B) Monorepo (fitquest repo) → in Render Dashboard set Root Directory = "backend"
#      OR move this file to the repo root and add: rootDir: backend

databases:
  - name: fitquest-db
    databaseName: fitquest
    user: fitquest
    plan: free
    region: oregon

services:
  - type: web
    name: fitquest-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitquest-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
